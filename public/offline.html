<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · Hertz PR Hub</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: calc(24px + env(safe-area-inset-top)) 24px calc(24px + env(safe-area-inset-bottom));
        background: #151515;
        color: #f2f3ee;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }
      .card { max-width: 340px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
      .mark {
        width: 56px; height: 56px;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid #2c2c2c; border-radius: 4px;
      }
      .kicker {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        text-transform: uppercase; letter-spacing: 0.16em;
        font-size: 11px; color: #9a9a96;
      }
      h1 { font-size: 20px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
      p { font-size: 14px; line-height: 1.55; color: #9a9a96; margin: 0; }
      button {
        font: inherit; font-weight: 600; font-size: 15px;
        min-height: 44px; padding: 0 22px; margin-top: 4px;
        border: 0; border-radius: 4px; cursor: pointer;
        background: #a3b7b7; color: #151515;
        transition: background 0.12s linear;
      }
      button:hover { background: #b4c6c6; }
      button:active { background: #90a6a6; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark" aria-hidden="true">
        <svg width="34" height="34" viewBox="0 0 56 56" fill="none">
          <path d="M4 28 Q10 12 16 28 T28 28 T40 28 T52 28"
                stroke="#a3b7b7" stroke-width="2.5" stroke-linecap="round" fill="none" />
        </svg>
      </div>
      <span class="kicker">hertz PR Hub</span>
      <h1>Sei offline</h1>
      <p>Non c'è connessione. Controlla la rete e riprova &mdash; i dati si sincronizzano appena torni online.</p>
      <button onclick="location.reload()">Riprova</button>
    </div>
  </body>
</html>
