<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · Hertz PR Hub</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #0a0a0a;
        color: #ededed;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        text-align: center;
      }
      .card { max-width: 360px; }
      .logo {
        width: 56px; height: 56px; margin: 0 auto 20px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 16px; background: #a855f7; color: #ede9fe;
        font-weight: 700; font-size: 18px; letter-spacing: -0.02em;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.5; color: #a1a1aa; margin: 0 0 20px; }
      button {
        font: inherit; font-weight: 600; font-size: 15px;
        padding: 10px 20px; border: 0; border-radius: 10px; cursor: pointer;
        background: #fafafa; color: #0a0a0a;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">HZ</div>
      <h1>Sei offline</h1>
      <p>Hertz PR Hub non riesce a raggiungere la rete. Controlla la connessione e riprova.</p>
      <button onclick="location.reload()">Riprova</button>
    </div>
  </body>
</html>
